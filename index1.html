<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grad Dash - Grade Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #ffffff;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
        }

        canvas {
            display: block;
            background: #ffffff;
        }

        #player-gif {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10;
            display: none;
            image-rendering: auto;
            transform-origin: top left;
            will-change: transform;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 50;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 2rem;
            border: 1px solid #e2e8f0;
            text-align: center;
            pointer-events: auto;
            max-width: 90%;
            width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .btn {
            background: #0ea5e9;
            color: white;
            padding: 1.25rem 2rem;
            border-radius: 1rem;
            font-weight: 800;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            box-shadow: 0 6px 0 #0369a1;
            margin-top: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            width: 100%;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0369a1;
        }

        .stats-container {
            position: absolute;
            top: 30px;
            display: flex;
            gap: 20px;
            pointer-events: none;
        }

        .stat-box {
            background: rgba(255,255,255,0.8);
            padding: 5px 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 700;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 800;
            color: #1e293b;
            line-height: 1;
        }

        #intermission-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 60;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(2px);
            opacity: 0;
            transition: opacity 0.5s;
        }

        #level-status {
            font-size: 4rem;
            font-weight: 900;
            color: #0ea5e9;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        #countdown {
            font-size: 2.5rem;
            font-weight: 800;
            color: #64748b;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <img id="player-gif" alt="player-animation">
    
    <div id="intermission-overlay">
        <div id="level-status">Stage Complete</div>
        <div id="countdown">Next Stage in 3...</div>
    </div>

    <div class="ui-overlay" id="loading-screen">
        <div class="menu-card">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">GRAD DASH</h1>
            <p class="text-slate-500 mb-6 italic">Master the Stages</p>
            <div id="loader-text" class="text-sky-600 font-bold animate-pulse mb-4">PREPARING LESSONS...</div>
            <button id="start-btn" class="btn hidden" onclick="startGame()">START CLASS</button>
        </div>
    </div>

    <div class="ui-overlay hidden" id="game-over">
        <div class="menu-card">
            <h2 class="text-3xl font-bold text-slate-800 mb-2">Study Break!</h2>
            <div class="flex justify-center gap-4 mb-6">
                <div class="text-center">
                    <p class="text-xs text-slate-400 font-bold uppercase">Final Level</p>
                    <p class="text-2xl font-black text-slate-700" id="final-level">1</p>
                </div>
                <div class="text-center">
                    <p class="text-xs text-slate-400 font-bold uppercase">Total Score</p>
                    <p class="text-2xl font-black text-sky-600" id="final-score">0</p>
                </div>
            </div>
            <button class="btn" onclick="startGame()">RETAKE EXAM</button>
        </div>
    </div>

    <div class="stats-container hidden" id="live-stats">
        <div class="stat-box">
            <span class="stat-label">Level</span>
            <span class="stat-value" id="level-val">1</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Score</span>
            <span class="stat-value" id="score-val">0</span>
        </div>
    </div>
</div>

<script>
    const GIF_URL = "https://raw.githubusercontent.com/eiflagnay/runollierun/refs/heads/main/OllieRun.webp"; 
    const JUMP_URL = "https://raw.githubusercontent.com/eiflagnay/runollierun/refs/heads/main/JumpOllie.png";

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const playerGif = document.getElementById('player-gif');
    const loadingScreen = document.getElementById('loading-screen');
    const gameOverScreen = document.getElementById('game-over');
    const intermissionOverlay = document.getElementById('intermission-overlay');
    const levelStatusText = document.getElementById('level-status');
    const countdownText = document.getElementById('countdown');
    const liveStats = document.getElementById('live-stats');
    const scoreVal = document.getElementById('score-val');
    const levelVal = document.getElementById('level-val');
    const finalScoreDisplay = document.getElementById('final-score');
    const finalLevelDisplay = document.getElementById('final-level');
    const startBtn = document.getElementById('start-btn');
    const loaderText = document.getElementById('loader-text');

    const jumpImg = new Image();
    jumpImg.src = JUMP_URL;

    playerGif.src = GIF_URL;

    let animationId;
    let gameState = 'LOADING'; 
    let score = 0;
    let currentLevel = 1;
    let gameSpeed = 6;
    let frameCount = 0;
    let obstacles = [];
    let intermissionTimer = 0;

    const GRAVITY = 0.65;
    const JUMP_FORCE = -15.5;
    const GROUND_Y_OFFSET = 120;
    const POINTS_PER_LEVEL = 150; 

    // Helper to determine grade based on level
    function getGradeInfo(level) {
        if (level <= 2) return { text: "F", color: "#ef4444", width: 45 };
        if (level <= 4) return { text: "E", color: "#f97316", width: 45 };
        if (level <= 6) return { text: "D", color: "#f59e0b", width: 45 };
        if (level <= 8) return { text: "C", color: "#fbbf24", width: 45 };
        if (level <= 10) return { text: "B", color: "#84cc16", width: 45 };
        if (level < 13) return { text: "A", color: "#10b981", width: 45 };
        if (level < 25) return { text: "A-", color: "#06b6d4", width: 60 };
        return { text: "A+", color: "#8b5cf6", width: 65 };
    }

    class Player {
        constructor() { this.reset(); }
        reset() {
            this.width = 120;
            this.height = 120;
            this.x = 100;
            this.y = canvas.height - GROUND_Y_OFFSET - this.height;
            this.vy = 0;
            this.isJumping = false;
            
            playerGif.src = GIF_URL;
            playerGif.style.width = `${this.width}px`;
            playerGif.style.height = `${this.height}px`;
            playerGif.style.display = 'none';
        }
        jump() {
            if (!this.isJumping && gameState === 'PLAYING') {
                this.vy = JUMP_FORCE;
                this.isJumping = true;
                playerGif.src = JUMP_URL;
            }
        }
        update() {
            this.vy += GRAVITY;
            this.y += this.vy;
            const groundY = canvas.height - GROUND_Y_OFFSET - this.height;
            
            if (this.y > groundY) {
                this.y = groundY;
                this.vy = 0;
                if (this.isJumping) {
                    this.isJumping = false;
                    playerGif.src = GIF_URL;
                }
            }

            const scaleY = this.isJumping ? 1.08 : 1.0;
            const scaleX = 2 - scaleY;
            
            playerGif.style.transform = `translate3d(${this.x}px, ${this.y}px, 0) scale(${scaleX}, ${scaleY})`;
            if (playerGif.style.display !== 'block' && (gameState === 'PLAYING' || gameState === 'INTERMISSION')) {
                playerGif.style.display = 'block';
            }
        }
    }

    class Obstacle {
        constructor(level) {
            const gradeInfo = getGradeInfo(level);
            this.text = gradeInfo.text;
            this.color = gradeInfo.color;
            this.width = gradeInfo.width;
            this.height = 60; // Text height approx
            this.x = canvas.width;
            this.y = canvas.height - GROUND_Y_OFFSET - this.height - 10;
            this.rotation = (Math.random() - 0.5) * 0.2; // Slight academic lean
        }
        update() { this.x -= gameSpeed; }
        draw() {
            ctx.save();
            ctx.translate(this.x + this.width/2, this.y + this.height/2);
            ctx.rotate(this.rotation);
            
            // Text shadow/glow
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color + "66";
            
            ctx.fillStyle = this.color;
            ctx.font = "900 60px 'Outfit'";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(this.text, 0, 0);
            
            // Red "Grading" mark look (optional underline)
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(-this.width/2, this.height/2 - 5);
            ctx.lineTo(this.width/2, this.height/2 - 2);
            ctx.stroke();

            ctx.restore();
        }
    }

    const player = new Player();

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.reset();
    }

    function startGame() {
        gameState = 'PLAYING';
        score = 0;
        currentLevel = 1;
        gameSpeed = 6;
        obstacles = [];
        player.reset();
        
        loadingScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        intermissionOverlay.style.opacity = '0';
        liveStats.classList.remove('hidden');
        
        scoreVal.textContent = "0";
        levelVal.textContent = "1";
        
        if (animationId) cancelAnimationFrame(animationId);
        gameLoop();
    }

    function startIntermission() {
        gameState = 'INTERMISSION';
        intermissionTimer = 180; 
        intermissionOverlay.style.opacity = '1';
        obstacles = []; 
        
        if (currentLevel >= 9 && currentLevel <= 10) {
            levelStatusText.textContent = "DIFFICULTY SPIKE!";
            levelStatusText.style.color = "#ef4444";
        } else {
            levelStatusText.textContent = `Stage ${currentLevel} Clear`;
            levelStatusText.style.color = "#0ea5e9";
        }
    }

    function endIntermission() {
        currentLevel++;
        gameState = 'PLAYING';
        intermissionOverlay.style.opacity = '0';
        levelVal.textContent = currentLevel;
        obstacles = []; 
    }

    function gameOver() {
        gameState = 'GAMEOVER';
        liveStats.classList.add('hidden');
        gameOverScreen.classList.remove('hidden');
        playerGif.style.display = 'none';
        finalScoreDisplay.innerText = Math.floor(score);
        finalLevelDisplay.innerText = currentLevel;
    }

    function update() {
        player.update();

        if (gameState === 'INTERMISSION') {
            intermissionTimer--;
            const seconds = Math.ceil(intermissionTimer / 60);
            countdownText.textContent = `Next Stage in ${seconds}...`;
            if (intermissionTimer <= 0) endIntermission();
            return;
        }

        if (gameState !== 'PLAYING') return;
        
        score += 0.2;
        scoreVal.textContent = Math.floor(score);

        if (score >= currentLevel * POINTS_PER_LEVEL) {
            startIntermission();
            return;
        }

        if (currentLevel < 10) {
            gameSpeed = 6 + (currentLevel * 0.15); 
            var spawnGap = 130 - (currentLevel * 2); 
        } else {
            const difficultyMultiplier = (currentLevel - 10) * 0.5;
            gameSpeed = 9 + difficultyMultiplier; 
            var spawnGap = Math.max(35, 80 - (difficultyMultiplier * 5)); 
        }

        frameCount++;
        if (frameCount % Math.floor(spawnGap) === 0) {
            obstacles.push(new Obstacle(currentLevel));
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].update();
            // Hitbox check
            if (player.x + 40 < obstacles[i].x + obstacles[i].width &&
                player.x + player.width - 40 > obstacles[i].x &&
                player.y + 40 < obstacles[i].y + obstacles[i].height &&
                player.y + player.height - 15 > obstacles[i].y) {
                gameOver();
            }
            if (obstacles[i].x < -200) obstacles.splice(i, 1);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.beginPath();
        ctx.strokeStyle = '#e2e8f0'; 
        ctx.lineWidth = 4;
        ctx.moveTo(0, canvas.height - GROUND_Y_OFFSET);
        ctx.lineTo(canvas.width, canvas.height - GROUND_Y_OFFSET);
        ctx.stroke();

        for (let i = 0; i < obstacles.length; i++) {
            obstacles[i].draw();
        }
    }

    function gameLoop() {
        update(); 
        draw();
        if (gameState === 'PLAYING' || gameState === 'INTERMISSION' || gameState === 'GAMEOVER') {
            animationId = requestAnimationFrame(gameLoop);
        }
    }

    const handleAction = (e) => { 
        if (e && e.target && e.target.tagName === 'BUTTON') return;
        player.jump();
    };

    window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') handleAction(); });
    window.addEventListener('mousedown', handleAction);
    window.addEventListener('touchstart', handleAction);
    window.addEventListener('resize', resize);

    function checkReady() {
        if (playerGif.complete && jumpImg.complete) {
            loaderText.innerText = "READY FOR CLASS!";
            startBtn.classList.remove('hidden');
        } else {
            setTimeout(checkReady, 500);
        }
    }

    window.onload = () => {
        resize();
        checkReady();
        draw();
    };
</script>
</body>
</html>
