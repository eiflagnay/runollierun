<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grad Dash - GIF Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #f8fafc;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
        }

        canvas {
            display: block;
            background: #ffffff;
        }

        #player-gif {
            position: absolute;
            /* Pin to top-left of container so translate(x, y) matches canvas coordinates */
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10;
            display: none;
            image-rendering: auto;
            transform-origin: top left;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 50;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 2rem;
            border: 1px solid #e2e8f0;
            text-align: center;
            pointer-events: auto;
            max-width: 90%;
            width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .btn {
            background: #0ea5e9;
            color: white;
            padding: 1.25rem 2rem;
            border-radius: 1rem;
            font-weight: 800;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            box-shadow: 0 6px 0 #0369a1;
            margin-top: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            width: 100%;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0369a1;
        }

        .score-display {
            position: absolute;
            top: 30px;
            font-size: 2.5rem;
            font-weight: 800;
            color: #1e293b;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <!-- This IMG tag handles the actual GIF animation -->
    <img id="player-gif" alt="player-animation">
    
    <div class="ui-overlay" id="loading-screen">
        <div class="menu-card">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">GRAD DASH</h1>
            <p class="text-slate-500 mb-6 italic">Animated GIF Edition</p>
            <div id="loader-text" class="text-sky-600 font-bold animate-pulse mb-4">PREPARING ASSETS...</div>
            <button id="start-btn" class="btn hidden" onclick="startGame()">START CLASS</button>
        </div>
    </div>

    <div class="ui-overlay hidden" id="game-over">
        <div class="menu-card">
            <h2 class="text-3xl font-bold text-slate-800 mb-2">Study Break!</h2>
            <p class="text-slate-500 mb-4">Total Score</p>
            <div class="text-6xl font-black text-sky-600 mb-8" id="final-score">0</div>
            <button class="btn" onclick="startGame()">RETAKE EXAM</button>
        </div>
    </div>

    <div class="score-display hidden" id="live-score">0</div>
</div>

<script>
    /** * MANUALLY ADD YOUR URL HERE 
     * Paste your hosted GIF link between the quotes below.
     */
    const GIF_URL = "https://raw.githubusercontent.com/eiflagnay/runollierun/refs/heads/main/runollie.gif"; 

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const playerGif = document.getElementById('player-gif');
    const loadingScreen = document.getElementById('loading-screen');
    const gameOverScreen = document.getElementById('game-over');
    const liveScore = document.getElementById('live-score');
    const finalScoreDisplay = document.getElementById('final-score');
    const startBtn = document.getElementById('start-btn');
    const loaderText = document.getElementById('loader-text');

    // Setup GIF source
    const finalSrc = GIF_URL || "https://img.icons8.com/color/144/graduation-cap.png";
    playerGif.src = finalSrc;

    let animationId;
    let gameState = 'LOADING';
    let score = 0;
    let gameSpeed = 7;
    let frameCount = 0;
    let obstacles = [];

    const GRAVITY = 0.6;
    const JUMP_FORCE = -15;
    const GROUND_Y_OFFSET = 120;

    class Player {
        constructor() { this.reset(); }
        reset() {
            this.width = 120;
            this.height = 120;
            this.x = 80;
            this.y = canvas.height - GROUND_Y_OFFSET - this.height;
            this.vy = 0;
            this.isJumping = false;
            
            // Sync initial style
            playerGif.style.width = `${this.width}px`;
            playerGif.style.height = `${this.height}px`;
            playerGif.style.display = 'none';
        }
        jump() {
            if (!this.isJumping) {
                this.vy = JUMP_FORCE;
                this.isJumping = true;
            }
        }
        update() {
            this.vy += GRAVITY;
            this.y += this.vy;
            const groundY = canvas.height - GROUND_Y_OFFSET - this.height;
            if (this.y > groundY) {
                this.y = groundY;
                this.vy = 0;
                this.isJumping = false;
            }

            // Sync GIF position with internal logic
            // Use scale to give that extra "squash and stretch" effect
            const scaleY = this.isJumping ? 1.08 : 1.0;
            const scaleX = 2 - scaleY;
            
            playerGif.style.transform = `translate(${this.x}px, ${this.y}px) scale(${scaleX}, ${scaleY})`;
            playerGif.style.display = (gameState === 'PLAYING') ? 'block' : 'none';
        }
        draw() {
            // Player is now drawn via DOM element (playerGif) to allow GIF animation
        }
    }

    class Obstacle {
        constructor() {
            this.width = 40 + Math.random() * 30;
            this.height = 50 + Math.random() * 40;
            this.x = canvas.width;
            this.y = canvas.height - GROUND_Y_OFFSET - this.height;
        }
        update() { this.x -= gameSpeed; }
        draw() {
            ctx.fillStyle = '#334155';
            ctx.beginPath(); ctx.roundRect(this.x, this.y, this.width, this.height, 8); ctx.fill();
            ctx.fillStyle = '#f97316'; ctx.fillRect(this.x, this.y, 4, this.height);
        }
    }

    const player = new Player();

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.reset();
    }

    function startGame() {
        gameState = 'PLAYING';
        score = 0;
        gameSpeed = 8;
        obstacles = [];
        player.reset();
        loadingScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        liveScore.classList.remove('hidden');
        if (animationId) cancelAnimationFrame(animationId);
        gameLoop();
    }

    function gameOver() {
        gameState = 'GAMEOVER';
        liveScore.classList.add('hidden');
        gameOverScreen.classList.remove('hidden');
        playerGif.style.display = 'none';
        finalScoreDisplay.innerText = Math.floor(score);
    }

    function update() {
        if (gameState !== 'PLAYING') return;
        score += 0.2;
        liveScore.innerText = Math.floor(score);
        gameSpeed = 8 + (score / 180);
        player.update();
        frameCount++;
        if (frameCount % Math.floor(Math.max(40, 110 - (score / 8))) === 0) obstacles.push(new Obstacle());
        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].update();
            if (player.x + 30 < obstacles[i].x + obstacles[i].width &&
                player.x + player.width - 30 > obstacles[i].x &&
                player.y + 30 < obstacles[i].y + obstacles[i].height &&
                player.y + player.height - 20 > obstacles[i].y) gameOver();
            if (obstacles[i].x < -100) obstacles.splice(i, 1);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Horizon Line
        ctx.strokeStyle = '#f1f5f9'; ctx.lineWidth = 2;
        for(let i=1; i<15; i++) { ctx.beginPath(); ctx.moveTo(0, i * 40); ctx.lineTo(canvas.width, i * 40); ctx.stroke(); }
        ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(0, canvas.height - GROUND_Y_OFFSET); ctx.lineTo(canvas.width, canvas.height - GROUND_Y_OFFSET); ctx.stroke();
        
        obstacles.forEach(o => o.draw());
        player.draw();
    }

    function gameLoop() {
        update(); draw();
        if (gameState === 'PLAYING' || gameState === 'GAMEOVER') animationId = requestAnimationFrame(gameLoop);
    }

    const handleAction = (e) => { 
        if (e && e.target && e.target.tagName === 'BUTTON') return;
        if (gameState === 'PLAYING') player.jump();
    };

    window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') handleAction(); });
    window.addEventListener('mousedown', handleAction);
    window.addEventListener('touchstart', handleAction);
    window.addEventListener('resize', resize);

    function checkReady() {
        if (playerGif.complete) {
            loaderText.innerText = "READY FOR CLASS!";
            startBtn.classList.remove('hidden');
        } else {
            setTimeout(checkReady, 500);
        }
    }

    window.onload = () => {
        resize();
        checkReady();
        draw();
    };
</script>
</body>
</html>
